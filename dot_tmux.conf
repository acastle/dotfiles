set-option -g history-limit 25000
set -sg escape-time 10
set-option -g focus-events on

# vi for copy mode
setw -g mode-keys vi

# status bar - Catppuccin Mocha
set -g status-style "fg=#a6adc8,bg=default"
set -g status-left-style "fg=#cdd6f4"
set -g status-right ""
set -g status-bg default
set -g status-position top
set -g status-interval 1
set -g status-left ""

# window status - clean pill using powerline round glyphs
set -g window-status-format " #I #W#{?window_zoomed_flag, Z,} "
set -g window-status-current-format "#[fg=#cba6f7,bg=default]#[fg=#1e1e2e,bg=#cba6f7,bold]#I #W#{?window_zoomed_flag, Z,}#[fg=#cba6f7,bg=default]"
set -g window-status-style "fg=#6c7086,bg=default"
set -g window-status-current-style "fg=#1e1e2e,bg=default"
set -g window-status-activity-style "fg=#fab387,bg=default"
set -g window-status-bell-style "fg=#f38ba8,bg=default,bold"
set -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# message / command prompt
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"

# copy mode
set -g mode-style "fg=#1e1e2e,bg=#f5c2e7,bold"

# status bar on, no right-side content
set -g status on

set -s set-clipboard on

# count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

# reload configuration
bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

set-option -a terminal-features 'xterm-ghostty:RGB'
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -as terminal-overrides ',*:indn@'
set -g mouse on
